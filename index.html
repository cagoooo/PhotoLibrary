<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 智慧活動照片影片產生器 - 透過 Gemini 視覺分析自動剪輯</title>
    <meta name="description" content="自動上傳照片紀錄，透過 Gemini 的智慧視覺辨識分析照片內容，自動撰寫旁白腳本，並一鍵產出包含動畫轉場、背景音樂及字幕的專業活動紀錄影片。" />
    <script>
      // 🛠️ Service Worker 與 PWA 開發規範：在 localhost 開發環境主動解除註冊 SW，避免 Vite HMR 衝突
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (let registration of registrations) {
              registration.unregister();
              console.log('✅ 已解除註冊 localhost Service Worker');
            }
          });
        }
      }
    </script>
    <script src="./coi-serviceworker.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
